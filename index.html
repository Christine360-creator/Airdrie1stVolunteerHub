<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volunteer Hub</title>

<link rel="icon" type="image/png" href="logod.png?v=2">
<link rel="apple-touch-icon" href="logod.png?v=2">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
:root {
  --brand-purple: #5B2E91;
  --brand-yellow: #FFCA00;
  --bg-light: #F4F5FA;
  --text-dark: #202040;
  --row-light: #f9f9f9;
  --row-dark: #ffffff;
}

body {
  font-family: 'Segoe UI', sans-serif;
  margin:0;
  padding:0;
  background: var(--bg-light);
  color: var(--text-dark);
}

/* KEEP YOUR DARK MODE */
body.dark-mode {
  --bg-light: #121212;
  --text-dark: #f5f5f5;
  --row-light: #1b1b1b;
  --row-dark: #242424;
}

/* HEADER (UNCHANGED) */
header {
  background: var(--brand-purple);
  color: white;
  padding: 10px 15px;
  text-align: center;
  display:flex;
  justify-content:center;
  align-items:center;
}

header img { height:45px; margin-right:10px; }
header h1 { color: var(--brand-yellow); font-size:1.4rem; margin:0; }

/* BUTTONS */
.button-container{
  position:sticky;
  top:0;
  background:var(--bg-light);
  padding:10px;
  text-align:center;
}

.button-container button{
  background:var(--brand-purple);
  color:var(--brand-yellow);
  border:none;
  padding:10px 18px;
  margin:5px;
  border-radius:30px;
}

/* SECTIONS */
section{
  margin:25px auto;
  width:90%;
  max-width:1000px;
  background:var(--row-dark);
  border-radius:16px;
  padding:20px;
}

/* TABLE */
.table-container{
  overflow-x:auto;
}

/* READ BUTTON */
#readAloudBtn{
  background:var(--brand-purple);
  color:var(--brand-yellow);
  border:none;
  padding:8px 14px;
  border-radius:30px;
  cursor:pointer;
}

/* 🔴 FIX 1: FOOTER RESTORED PURPLE */
footer{
  margin-top:35px;
  padding:20px 10px;
  background: var(--brand-purple) !important;
  color:white;
  text-align:center;
}

footer a{
  color: var(--brand-yellow);
  text-decoration:none;
}
</style>
</head>

<body>

<header>
  <img src="https://raw.githubusercontent.com/Christine360-creator/VolunteerHub/c65ad3dee2ed68a1749eab9f566490ebf80b7dd8/airdrie1st%20logo.png">
  <h1>Welcome to Airdrie 1st Volunteer Hub</h1>
</header>

<div class="button-container">
  <button onclick="scrollToSection('volunteerSection')">Table View</button>
  <button onclick="scrollToSection('calendarSection')">Calendar View</button>
  <button onclick="scrollToSection('fundraisersSection')">Fundraisers</button>
  <button id="darkModeToggle">Dark Mode</button>
</div>

<section id="notificationsSection">
  <h2>Notifications</h2>
  <button id="readAloudBtn">🔊 Read Aloud</button>
  <div id="notificationsContent"></div>
</section>

<section id="volunteerSection">
  <h2>Volunteer Schedule</h2>
  <input id="searchInput" placeholder="Search in table...">
  <div class="table-container">
    <table>
      <thead><tr id="tableHeader"></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</section>

<section id="calendarSection">
  <h2>Calendar View</h2>
  <iframe width="100%" height="600"
    src="https://calendar.google.com/calendar/embed?src=6d8c4ff38f75611efb175c6cb8a575bce4d3521b797303078b8b04de29294f38%40group.calendar.google.com&ctz=America%2FEdmonton">
  </iframe>
</section>

<section id="fundraisersSection">
  <h2>Fundraisers</h2>
  <p>Here you will find links to our current fundraisers and the links to copy and paste to share them.</p>
</section>

<footer>
  Contact me: <a href="mailto:Volunteer@Airdrie1st.com">Volunteer@Airdrie1st.com</a>
</footer>

<script>

/* 🔵 FIX 2: READ ALOUD SAFE + WORKING */
const readBtn = document.getElementById("readAloudBtn");

readBtn.addEventListener("click", () => {
  const synth = window.speechSynthesis;

  if (!synth) return;

  if (synth.speaking) {
    synth.cancel();
    readBtn.textContent = "🔊 Read Aloud";
    return;
  }

  const content = document.getElementById("notificationsContent");

  if (!content || content.innerText.trim() === "") return;

  const speech = new SpeechSynthesisUtterance(content.innerText);
  speech.lang = "en-CA";

  speech.onend = () => {
    readBtn.textContent = "🔊 Read Aloud";
  };

  readBtn.textContent = "⏹ Stop Reading";
  synth.speak(speech);
});

</script>

</body>
</html>
